services:
  # migrate database (using supabase so just inject the .env)
  migrate:
    image: 'wilson23001/tugas-1-ppl-praktikum-migrate'
    env_file:
      - ../../.env
    command: pnpm prisma migrate deploy

  app:
    image: 'wilson23001/tugas-1-ppl-praktikum'
    depends_on:
      migrate:
        condition: service_completed_successfully
    # change port to match with server setup
    ports:
      - '3000:3000'
    env_file:
      - ../../.env
