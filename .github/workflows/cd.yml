name: CD
run-name: CD for commit ${{ github.sha }} by @${{ github.actor }}

on:
  push:
    branches: ['main']
  workflow_run:
    workflows: ['CI']
    types: ['completed']
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAC }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract App image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKER_USERNAME }}/tugas-1-ppl-praktikum

      - name: Build and push App image
        uses: docker/build-push-action@v7
        with:
          # build context start from root folder
          context: .
          file: ./docker/prod/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true

      - name: Extract migrate image metadata
        id: meta-migrate
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKER_USERNAME }}/tugas-1-ppl-praktikum-migrate

      - name: Build and push migrate image
        uses: docker/build-push-action@v7
        with:
          # build context start from root folder
          context: .
          file: ./docker/prod/Dockerfile.migrate
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-migrate.outputs.tags }}
          annotations: ${{ steps.meta-migrate.outputs.annotations }}
          provenance: true
          sbom: true
